services:
  - type: web
    name: kai-labs-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kai-labs-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MASTER_KEY
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: PORT
        value: 3000

databases:
  - name: kai-labs-db
    plan: free
